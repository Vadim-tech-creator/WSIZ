<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Document</title>
</head>
<body>
    <form class="container" id="register">
        <div class="top-header">
            <header>Registration on Site</header>
        </div>
        <div class="input-field">
            <input type="text" class="input" id="user" placeholder="User">
        </div>
         <div class="input-field">
            <input type="text" class="input" id="email" placeholder="Email">
        </div>
        <div class="input-field">
            <input type="number" class="input" id="age" placeholder="Age">
        </div>
        <div class="input-field">
            <input type="text" class="input" id="technology" placeholder="Field for technology">
        </div>
        <div class="confirmation">
            <input type="checkbox" id="check">
            <label for="check">I agree with all the rules</label>
        </div>
        <div class="input-field">
            <input type="submit" class="submit" value="confirm">
        </div>
        <div id="message"></div>
    </form>
    <script src="./script.js"></script>
</body>
</html>
