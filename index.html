<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="top-header">
            <header>Registration on Site</header>
        </div>
        <div class="input-field">
            <input type="text" class="input" placeholder="User" required>
        </div>
         <div class="input-field">
            <input type="text" class="input" placeholder="Email" required>
        </div>
        <div class="input-field">
            <input type="number" class="input" placeholder="Age" required>
        </div>
        <div class="input-field">
            <input type="text" class="input" placeholder="Field for technology" required>
        </div>
        <div class="confirmation">
            <input type="checkbox" id="check">
            <label for="check">I agree with all the rules</label>
        </div>
        <div class="input-field">
            <input type="submit" class="submit" value="confirm">
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
